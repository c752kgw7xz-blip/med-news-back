<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedNews — Connexion</title>
<script src="/shared.js?v=7"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [data-theme="light"] {
    --bg: #F8FAFC; --surface: #FFFFFF; --surface2: #F1F5F9;
    --border: #E2E8F0; --border-strong: #CBD5E1;
    --text: #0F172A; --text2: #1E293B; --text3: #475569;
    --red-dark: #FFF1F2;
  }
  [data-theme="dark"] {
    --bg: #0F1117; --surface: #161B27; --surface2: #1E2535;
    --border: #2A3444; --border-strong: #3D4F66;
    --text: #E2E8F0; --text2: #CBD5E1; --text3: #94A3B8;
    --red-dark: #2D1218;
  }
  :root { --green: #C41E3A; --red: #DC2626; --radius: 6px; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    font-size: calc(14px * var(--font-scale, 1)); line-height: 1.6;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow-x: hidden;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 44px 40px; width: 100%; max-width: 400px; margin: 24px;
  }
  .logo {
    font-family: 'Instrument Serif', Georgia, serif; font-size: 1.4rem; font-weight: 400;
    color: var(--text); text-align: center; margin-bottom: 4px; letter-spacing: -.3px;
  }
  .logo em { font-style: italic; }
  .logo b { font-weight: 700; font-style: normal; }
  .subtitle { text-align: center; color: var(--text3); font-size: 0.82rem; margin-bottom: 32px; }
  label { display: block; font-weight: 500; font-size: 0.79rem; margin-bottom: 6px; color: var(--text2); }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 0.86rem; margin-bottom: 16px;
    outline: none; transition: border-color .2s;
    background: var(--surface2); color: var(--text); font-family: inherit;
  }
  input::placeholder { color: var(--text3); }
  input:focus { border-color: var(--green); }
  .btn {
    width: 100%; padding: 11px; background: var(--green); color: #fff; border: none;
    border-radius: var(--radius); font-size: 0.88rem; font-weight: 600;
    cursor: pointer; transition: opacity .2s; font-family: inherit; margin-top: 4px;
  }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .error {
    background: var(--red-dark); color: var(--red); padding: 10px 12px;
    border-radius: var(--radius); font-size: 0.79rem; margin-bottom: 16px;
    display: none; border: 1px solid #e8c0c0;
  }
  .link { text-align: center; margin-top: 20px; font-size: 0.79rem; color: var(--text3); }
  .link a { color: var(--green); text-decoration: none; font-weight: 500; }
  .link a:hover { text-decoration: underline; }
  @media (max-width: 480px) { .card { padding: 32px 20px; margin: 16px; } }
</style>
<script src="/banner.js"></script>
</head>
<body>
  <div class="card">
    <div class="logo"><em>Med</em><b>News</b></div>
    <div class="subtitle">Connexion au portail</div>
    <div class="error" id="error"></div>
    <form id="form">
      <label for="email">Adresse email</label>
      <input type="email" id="email" required autocomplete="email" placeholder="vous@exemple.fr">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" required autocomplete="current-password">
      <button class="btn" type="submit" id="submit-btn">Se connecter</button>
    </form>
    <div class="link">Pas encore de compte ? <a href="/signup">Inscription</a></div>
  </div>

<script>
const API = window.location.origin;
const form = document.getElementById('form');
const errorEl = document.getElementById('error');
const btn = document.getElementById('submit-btn');

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Connexion...';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();

    if (!res.ok) {
      if (res.status === 403 && data.detail === 'email not verified') {
        showError('Votre email n\u2019est pas encore v\u00e9rifi\u00e9. Consultez votre bo\u00eete mail.');
      } else {
        showError(data.detail || 'Identifiants incorrects');
      }
      return;
    }

    sessionStorage.setItem('access_token', data.access_token);

    let dest = '/portal';
    try {
      const payload = JSON.parse(atob(data.access_token.split('.')[1]));
      if (payload.adm) dest = '/review';
    } catch {}
    window.location.href = dest;
  } catch (err) {
    showError('Erreur de connexion au serveur');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
});
</script>
</body>
</html>
