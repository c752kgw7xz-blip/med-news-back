<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MedNews — Connexion</title>
<script src="/shared.js?v=7"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); background: var(--bg); }
  [data-theme="light"] {
    --bg: #F4F6F9; --surface: #FFFFFF; --surface2: #EEF2F7;
    --border: #DDE3ED; --border-strong: #BBC6D8;
    --text: #0D1B2A; --text2: #3D5066; --text3: #6B7FA0; --text4: #A0AFCA;
  }
  [data-theme="dark"] {
    --bg: #0F1117; --surface: #161B27; --surface2: #1E2535;
    --border: #2A3444; --border-strong: #3D4F66;
    --text: #E2E8F0; --text2: #CBD5E1; --text3: #94A3B8; --text4: #64748B;
  }
  :root { --green: #9B2335; --red: #DC2626; --radius: 6px; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg); color: var(--text);
    font-size: calc(14px * var(--font-scale, 1)); line-height: 1.6;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow-x: hidden; overscroll-behavior: none;
  }
  .card {
    background: var(--surface); border-radius: var(--radius);
    padding: 44px 40px; width: 100%; max-width: 400px; margin: 24px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.10), 0 2px 4px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -2px 0 rgba(0,0,0,0.06);
    border: transparent; outline: 1px solid rgba(0,0,0,0.07);
  }
  .logo {
    font-family: 'Instrument Serif', Georgia, serif; font-size: 1.4rem; font-weight: 400;
    color: var(--text); text-align: center; margin-bottom: 4px; letter-spacing: -.3px;
  }
  .logo em { font-style: italic; }
  .logo b { font-weight: 700; font-style: normal; }
  .subtitle { text-align: center; color: var(--text3); font-size: 0.82rem; margin-bottom: 32px; }
  label { display: block; font-weight: 500; font-size: 0.79rem; margin-bottom: 6px; color: var(--text2); }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 0.86rem; margin-bottom: 16px;
    outline: none; transition: border-color .2s;
    background: #fff; color: var(--text); font-family: inherit;
    box-shadow: 0 2px 0 var(--border), 0 2px 6px rgba(0,0,0,0.05), inset 0 1px 3px rgba(0,0,0,0.04);
  }
  input::placeholder { color: var(--text4); }
  input:focus { border-color: var(--green); }
  .btn {
    display: block; width: 100%; padding: 13px 24px;
    background: var(--green); color: #fff; border: none;
    border-radius: var(--radius); font-size: 0.88rem; font-weight: 600;
    cursor: pointer; font-family: inherit; margin-top: 4px;
    box-shadow: 0 4px 0 #6b1624, 0 6px 12px rgba(155,35,53,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: transform .1s, box-shadow .1s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 5px 0 #6b1624, 0 8px 16px rgba(155,35,53,0.4), inset 0 1px 0 rgba(255,255,255,0.15); }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #6b1624, 0 2px 6px rgba(155,35,53,0.3), inset 0 1px 0 rgba(255,255,255,0.15); }
  .btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; transform: none; }
  .error {
    background: #FFF1F2; color: var(--red); padding: 10px 12px;
    border-radius: var(--radius); font-size: 0.79rem; margin-bottom: 16px;
    display: none; border: 1px solid #e8c0c0;
  }
  .link { text-align: center; margin-top: 20px; font-size: 0.79rem; color: var(--text3); }
  .link a { color: var(--green); text-decoration: none; font-weight: 500; }
  .link a:hover { text-decoration: underline; }
  @media (max-width: 480px) { .card { padding: 32px 20px; margin: 16px; } }
  .divider { text-align: center; color: var(--text3); font-size: 0.75rem; margin: 12px 0 4px; }
  .btn-biometric {
    width: 100%; padding: 11px; background: #fff; color: var(--text2);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 0.88rem; font-weight: 500; cursor: pointer;
    font-family: inherit; margin-top: 6px;
    display: none; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 3px 0 var(--border-strong), 0 4px 8px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
    transition: transform .1s, box-shadow .1s;
  }
  .btn-biometric:hover { transform: translateY(-1px); box-shadow: 0 4px 0 var(--border-strong), 0 6px 12px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.9); }
  .btn-biometric:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--border-strong), 0 2px 4px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9); }
</style>
<script src="/banner.js"></script>
<script src="/native-bridge.js?v=2" defer></script>
</head>
<body>
  <div class="card">
    <a href="/" class="logo" style="text-decoration:none;display:block;"><em>Med</em><b>News</b></a>
    <div class="subtitle">Connexion au portail</div>
    <div class="error" id="error"></div>
    <form id="form">
      <label for="email">Adresse email</label>
      <input type="email" id="email" required autocomplete="email" placeholder="vous@exemple.fr">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" required autocomplete="current-password">
      <button class="btn" type="submit" id="submit-btn">Se connecter</button>
    </form>
    <div class="divider" id="biometric-divider" style="display:none;">ou</div>
    <button class="btn-biometric" id="btn-biometric" onclick="loginWithBiometric()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4-1.79 4-4 4"/><circle cx="12" cy="12" r="1.5"/></svg>
      Face ID / Touch ID
    </button>
    <div class="link">Pas encore de compte ? <a href="/signup">Inscription</a></div>
  </div>

<script>
const API = window.location.origin;
const form = document.getElementById('form');
const errorEl = document.getElementById('error');
const btn = document.getElementById('submit-btn');

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

function redirectAfterLogin(token) {
  localStorage.setItem('access_token', token);
  // flush push token APRÈS avoir stocké access_token
  if (window.MedNewsNative) window.MedNewsNative.flushPushToken();
  let dest = '/portal';
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.adm) dest = '/review';
  } catch {}
  window.location.href = dest;
}

async function doLogin(email, password) {
  const res = await fetch(`${API}/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email, password }),
  });
  const data = await res.json();
  if (!res.ok) {
    if (res.status === 403 && data.detail === 'email not verified') {
      throw new Error('Votre email n\u2019est pas encore v\u00e9rifi\u00e9. Consultez votre bo\u00eete mail.');
    }
    throw new Error('Identifiants incorrects.');
  }
  return data.access_token;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Connexion\u2026';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const token = await doLogin(email, password);

    // Sauvegarder les credentials via biom\u00e9trie si dispo (premi\u00e8re fois)
    const native = window.MedNewsNative;
    if (native && native.isNative && await native.isBiometricAvailable()) {
      const existing = await native.getCredentials();
      if (!existing) await native.saveCredentials(email, password);
    }

    redirectAfterLogin(token);
  } catch (err) {
    showError('Identifiants incorrects ou erreur de connexion.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
});

async function loginWithBiometric() {
  const native = window.MedNewsNative;
  if (!native) return;
  errorEl.style.display = 'none';

  const ok = await native.authenticateWithBiometric();
  if (!ok) { showError('Authentification biom\u00e9trique \u00e9chou\u00e9e.'); return; }

  const creds = await native.getCredentials();
  if (!creds) { showError('Aucun identifiant sauvegard\u00e9. Connectez-vous une premi\u00e8re fois.'); return; }

  btn.disabled = true;
  btn.textContent = 'Connexion\u2026';
  try {
    const token = await doLogin(creds.username, creds.password);
    redirectAfterLogin(token);
  } catch (err) {
    showError('Une erreur est survenue. Veuillez réessayer.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}

// Afficher le bouton biom\u00e9trie si dispo (apr\u00e8s chargement du bridge natif)
window.addEventListener('load', async () => {
  await new Promise(r => setTimeout(r, 150));
  const native = window.MedNewsNative;
  if (!native || !native.isNative) return;
  const available = await native.isBiometricAvailable();
  if (!available) return;
  document.getElementById('biometric-divider').style.display = 'block';
  document.getElementById('btn-biometric').style.display = 'flex';
  // Auto-trigger si credentials d\u00e9j\u00e0 sauvegard\u00e9s
  const creds = await native.getCredentials();
  if (creds) loginWithBiometric();
});
</script>
</body>
</html>
