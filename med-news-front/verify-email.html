<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedNews — Vérification email</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4ef; --surface: #ffffff; --border: #e0ded7;
    --text: #2C2C2A; --text2: #5F5E5A; --text3: #888780;
    --green: #1D9E75; --green-light: #E1F5EE;
    --red: #A32D2D; --red-light: #FCEBEB;
    --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: var(--shadow); padding: 40px; width: 100%; max-width: 420px; margin: 24px;
    text-align: center;
  }
  .logo { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
  .logo span { color: var(--green); }
  .spinner { font-size: 32px; margin-bottom: 16px; animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { font-size: 15px; color: var(--text2); margin-bottom: 20px; }
  .success { color: #085041; }
  .error-text { color: var(--red); }
  .btn {
    display: inline-block; padding: 10px 24px; background: var(--green); color: #fff;
    border-radius: var(--radius); text-decoration: none; font-weight: 600; font-size: 14px;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .9; }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Med<span>News</span></div>
    <div id="loading">
      <div class="spinner">&#8635;</div>
      <div class="status">Vérification en cours...</div>
    </div>
    <div id="result" class="hidden">
      <div class="status" id="message"></div>
      <a href="/login" class="btn">Se connecter</a>
    </div>
  </div>

<script>
const API = window.location.origin;

(async () => {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const message = document.getElementById('message');

  if (!token) {
    loading.classList.add('hidden');
    result.classList.remove('hidden');
    message.classList.add('error-text');
    message.textContent = 'Lien invalide : aucun token fourni.';
    return;
  }

  try {
    const res = await fetch(`${API}/auth/verify-email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await res.json();

    loading.classList.add('hidden');
    result.classList.remove('hidden');

    if (res.ok) {
      message.classList.add('success');
      message.textContent = 'Email vérifié avec succès ! Vous pouvez maintenant vous connecter.';
    } else {
      message.classList.add('error-text');
      message.textContent = data.detail || 'Erreur lors de la vérification.';
    }
  } catch {
    loading.classList.add('hidden');
    result.classList.remove('hidden');
    message.classList.add('error-text');
    message.textContent = 'Erreur de connexion au serveur.';
  }
})();
</script>
</body>
</html>
