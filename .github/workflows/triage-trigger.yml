name: MedNews — Déclenchement triage Hetzner

# Déclenchement MANUEL uniquement — les 3 slots sont gérés par le cron Hetzner
# (/etc/cron.d/mednews-triage : 05h / 11h / 17h UTC tous les 2 jours).
# Ce workflow sert au rattrapage ou aux tests.

on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot de triage (1, 2 ou 3)'
        required: true
        default: '1'
      dry_run:
        description: 'Dry-run (affiche les commandes sans les exécuter)'
        required: false
        default: 'false'

jobs:
  trigger-triage:
    name: Déclencher triage sur Hetzner
    runs-on: ubuntu-latest

    steps:
      - name: Vérification prérequis
        run: |
          if [ -z "${{ secrets.HETZNER_IP }}" ]; then
            echo "ERREUR : secret HETZNER_IP manquant"
            exit 1
          fi
          if [ -z "${{ secrets.HETZNER_DEPLOY_KEY }}" ]; then
            echo "ERREUR : secret HETZNER_DEPLOY_KEY manquant"
            exit 1
          fi
          echo "Cible : ${{ secrets.HETZNER_IP }} — Slot : ${{ github.event.inputs.slot }}"

      - name: Configurer clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HETZNER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull dernières modifications sur le serveur
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_IP }} \
            "git -C /opt/mednews pull --ff-only"

      - name: Déclencher triage (background)
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_IP }} \
            "nohup /opt/mednews/scripts/triage_orchestrator.sh --slot ${{ github.event.inputs.slot }} $DRY_RUN_FLAG \
              > /var/log/mednews/gha_trigger_$(date +%Y%m%d_%H%M%S).log 2>&1 &
             echo \"Triage slot ${{ github.event.inputs.slot }} lancé (PID \$!)\""

      - name: Confirmation
        run: |
          echo "Triage slot ${{ github.event.inputs.slot }} lancé sur ${{ secrets.HETZNER_IP }}"
          echo "Logs disponibles sur le serveur : /var/log/mednews/"
