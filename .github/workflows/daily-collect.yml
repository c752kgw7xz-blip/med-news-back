name: MedNews — Collecte quotidienne spécialités 11-20

on:
  schedule:
    # 4h00 UTC = 6h00 Paris (CEST) — décalé pour éviter collision avec les 2 autres workflows
    - cron: '0 4 * * *'
  # Déclenchement manuel depuis l'onglet Actions si besoin
  workflow_dispatch:
    inputs:
      specialties:
        description: 'Spécialités à collecter (séparées par virgule, vide = toutes les 10)'
        required: false
        default: ''
      days:
        description: 'Fenêtre de collecte en jours'
        required: false
        default: '120'

jobs:
  collect:
    name: Collecte spécialités 11-20
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: env

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
      PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      PISTE_ENV: 'production'
      SCHEDULER_ENABLED: 'false'
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Debug secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERREUR: DATABASE_URL est vide — secrets non chargés depuis l'environnement 'env'"
            exit 1
          else
            echo "DATABASE_URL: chargé (${#DATABASE_URL} chars)"
            echo "PISTE_CLIENT_ID: ${PISTE_CLIENT_ID:0:8}..."
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérifier connexion DB
        run: |
          python3 - <<'EOF'
          import psycopg2, os
          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = conn.cursor()
          cur.execute("SELECT COUNT(*) FROM candidates WHERE status='NEW'")
          print(f"Candidats NEW actuels : {cur.fetchone()[0]}")
          conn.close()
          print("Connexion DB OK")
          EOF

      - name: Collecter — endocrinologie
        run: python3 scripts/collect_specialty.py endocrinologie ${{ github.event.inputs.days || '120' }}

      - name: Collecter — gastro-enterologie
        run: python3 scripts/collect_specialty.py gastro-enterologie ${{ github.event.inputs.days || '120' }}

      - name: Collecter — geriatrie
        run: python3 scripts/collect_specialty.py geriatrie ${{ github.event.inputs.days || '120' }}

      - name: Collecter — gynecologie
        run: python3 scripts/collect_specialty.py gynecologie ${{ github.event.inputs.days || '120' }}

      - name: Collecter — hematologie
        run: python3 scripts/collect_specialty.py hematologie ${{ github.event.inputs.days || '120' }}

      - name: Collecter — infectiologie
        run: python3 scripts/collect_specialty.py infectiologie ${{ github.event.inputs.days || '120' }}

      - name: Collecter — infirmiers
        run: python3 scripts/collect_specialty.py infirmiers ${{ github.event.inputs.days || '120' }}

      - name: Collecter — kinesitherapie
        run: python3 scripts/collect_specialty.py kinesitherapie ${{ github.event.inputs.days || '120' }}

      - name: Collecter — medecine-generale
        run: python3 scripts/collect_specialty.py medecine-generale ${{ github.event.inputs.days || '120' }}

      - name: Résumé final
        if: always()
        run: |
          python3 - <<'EOF'
          import psycopg2, os
          from datetime import datetime, timedelta

          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = conn.cursor()

          slugs = [
              'endocrinologie','gastro-enterologie','geriatrie','gynecologie',
              'hematologie','infectiologie','infirmiers','kinesitherapie',
              'medecine-generale'
          ]
          since = datetime.utcnow() - timedelta(hours=3)

          print("\n=== RÉSUMÉ COLLECTE ===")
          total = 0
          cur.execute(
              "SELECT source, COUNT(*) FROM candidates WHERE created_at > %s GROUP BY source ORDER BY COUNT(*) DESC",
              (since,)
          )
          rows = cur.fetchall()
          for source, count in rows:
              print(f"  {source:50s} {count:5d}")
              total += count
          print(f"\nTotal insérés (3 dernières heures) : {total}")

          cur.execute("SELECT COUNT(*) FROM candidates WHERE status='NEW'")
          print(f"Total candidats NEW en attente de triage : {cur.fetchone()[0]}")
          conn.close()
          EOF
