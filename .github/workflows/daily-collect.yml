      - name: Collecter — urologie
        env:
          MEDNEWS_SKIP_GLOBAL: 'true'
        run: python3 scripts/collect_specialty.py urologie ${{ github.event.inputs.days || '1' }}

      - name: Résumé final
        if: always()
        run: |
          python3 - <<'EOF'
          import psycopg2, os
          from datetime import datetime, timedelta

          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = conn.cursor()

          since = datetime.utcnow() - timedelta(hours=4)

          print("\n=== RÉSUMÉ COLLECTE ===")
          total = 0
          cur.execute(
              "SELECT source, COUNT(*) FROM candidates WHERE created_at > %s GROUP BY source ORDER BY COUNT(*) DESC",
              (since,)
          )
          for source, count in cur.fetchall():
              print(f"  {source:50s} {count:5d}")
              total += count
          print(f"\nTotal insérés (4 dernières heures) : {total}")

          cur.execute("SELECT COUNT(*) FROM candidates WHERE status='NEW'")
          print(f"Total candidats NEW en attente de triage : {cur.fetchone()[0]}")
          conn.close()
          EOF
