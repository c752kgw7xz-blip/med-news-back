        run: python3 scripts/collect_specialty.py chirurgie-orthopedique ${{ github.event.inputs.days || '1' }}

      - name: Collecter — chirurgie-pediatrique
        env:
          MEDNEWS_SKIP_GLOBAL: 'true'
