name: MedNews — Collecte tous les deux jours

on:
  schedule:
    # 3h00 UTC = 4h00 CET (hiver) / 5h00 CEST (été) — tous les 4 jours
    - cron: '0 3 */4 * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Fenêtre de collecte en jours'
        required: false
        default: '1'

jobs:
  collect:
    name: Collecte quotidienne — toutes spécialités
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: env

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
      PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      AMELI_PROXY: ${{ secrets.AMELI_PROXY }}
      PISTE_ENV: 'production'
      SCHEDULER_ENABLED: 'false'
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Debug secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERREUR: DATABASE_URL est vide — secrets non chargés depuis l'environnement 'env'"
            exit 1
          else
            echo "DATABASE_URL: chargé (${#DATABASE_URL} chars)"
            echo "PISTE_CLIENT_ID: ${PISTE_CLIENT_ID:0:8}..."
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérifier connexion DB
        run: |
          python3 - <<'EOF'
          import psycopg2, os
          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = conn.cursor()
          cur.execute("SELECT COUNT(*) FROM candidates WHERE status='NEW'")
          print(f"Candidats NEW actuels : {cur.fetchone()[0]}")
          conn.close()
          print("Connexion DB OK")
          EOF

      - name: Collecter — sources globales (cross-spécialités)
        run: python3 scripts/collect_global.py ${{ github.event.inputs.days || '1' }}

      - name: Collecter — anesthesiologie
        env:
          MEDNEWS_SKIP_GLOBAL: 'true'
        run: python3 scripts/collect_specialty.py anesthesiologie ${{ github.event.inputs.days || '1' }}

      - name: Collecter — biologiste
        env:
          MEDNEWS_SKIP_GLOBAL: 'true'
        run: python3 scripts/collect_specialty.py biologiste ${{ github.event.inputs.days || '1' }}

      - name: Collecter — cardiologie
        env:
          MEDNEWS_SKIP_GLOBAL: 'true'
        run: python3 scripts/collect_specialty.py cardiologie ${{ github.event.inputs.days || '1' }}

      - name: Collecter — chirurgie-cardiaque
